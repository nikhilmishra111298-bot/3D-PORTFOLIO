<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Page Not Found | Nikhil Mishra</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>

    .error-page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
    }

    .error-page h1{
      font-size:140px;
      color:#00f5ff;
      line-height:1;
      margin-bottom:20px;
    }

    .error-page h2{
      font-size:42px;
      margin-bottom:20px;
    }

    .error-page p{
      color:#94a3b8;
      max-width:650px;
      margin-bottom:40px;
      line-height:1.8;
    }

    .error-page a{
      padding:18px 35px;
      border-radius:50px;
      background:#00f5ff;
      color:black;
      text-decoration:none;
      font-weight:800;
    }

    @media(max-width:768px){

      .error-page h1{
        font-size:90px;
      }

      .error-page h2{
        font-size:30px;
      }

    }

  </style>

</head>
<body>

  <div class="animated-grid"></div>

  <section class="error-page">

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
      The page you are looking for does not exist or may have been moved.
    </p>

    <a href="index.html">
      Back To Portfolio
    </a>

  </section>

</body>
</html>
